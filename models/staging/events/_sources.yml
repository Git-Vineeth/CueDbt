version: 2

sources:
  - name: event_analytics
    description: "All product events across the Cuemath app."
    schema: event_analytics
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    loaded_at_field: event_ts_ist

    tables:
      - name: events
        description: >
          Raw app events table. Hundreds of millions of rows. Never query directly —
          always use the incremental staging model stg_events__mathgym_funnel which
          pre-filters to MathGym-relevant events since launch date (2026-02-11).
