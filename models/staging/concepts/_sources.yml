version: 2

sources:
  - name: concepts
    description: "MathFit test data from the concepts microservice."
    schema: application_service_concepts
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    loaded_at_field: created_on

    tables:
      - name: mathfit_test
        description: "One row per test. overall_score is null until all sections are COMPLETED."
      - name: mathfit_test_section
        description: "One row per section per test. section_score is null until section is COMPLETED."
      - name: user_node
        description: >
          One row per node/section state per student per test.
          state column is the source of truth for completion (not timestamps).
          States: COMPLETED, IN_PROGRESS, NOT_STARTED, LOCKED.
      - name: user_attempt
        description: >
          One row per attempt. accuracy and time_spent are ~70% null until completed.
