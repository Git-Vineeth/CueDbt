version: 2

sources:
  - name: revenuecat
    description: "RevenueCat subscription lifecycle events — MathGym subscriptions."
    schema: application_service_intelenrollment
    freshness:
      warn_after: {count: 12, period: hour}
      error_after: {count: 24, period: hour}
    loaded_at_field: created_on

    tables:
      - name: revenue_cat_events_log
        description: >
          One row per subscription lifecycle event per user.
          IMPORTANT: Always filter environment != 'SANDBOX' — Apple/Google test purchases
          are included in raw data. Filter applied in intermediate, not staging.
          Event types: INITIAL_PURCHASE, RENEWAL, CANCELLATION, EXPIRATION, BILLING_ISSUE.
          Period types: TRIAL, NORMAL.
