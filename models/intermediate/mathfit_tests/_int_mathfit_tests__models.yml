version: 2

models:
  - name: int_mathfit_tests__section_detail
    description: "One row per section per student per test. section_status from user_node.state."

  - name: int_mathfit_tests__student_test_status
    description: "One row per student per test. Aggregated section counts and test_status."
    columns:
      - name: student_id
        tests: [not_null]
      - name: created_on_month
        tests: [not_null]

  - name: int_mathfit_tests__student_lifetime
    description: "One row per student (lifetime). Total tests assigned and completed."
    columns:
      - name: student_id
        tests: [unique, not_null]
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['NAM', 'ISC', 'ROW']
