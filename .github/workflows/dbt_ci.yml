name: dbt CI

on:
  pull_request:
    paths:
      - 'models/**'
      - 'macros/**'
      - 'tests/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
      - 'packages.yml'

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-redshift==1.10.1

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          cue_dbt:
            target: ci
            outputs:
              ci:
                type: redshift
                host: ${{ secrets.REDSHIFT_HOST }}
                user: ${{ secrets.REDSHIFT_CI_USER }}
                password: ${{ secrets.REDSHIFT_CI_PASSWORD }}
                port: 5439
                dbname: ${{ secrets.REDSHIFT_DBNAME }}
                schema: dbt_ci
                threads: 4
                ra3_node: true
          EOF

      - name: Install packages
        run: dbt deps

      - name: Compile (catch syntax errors)
        run: dbt compile --target ci

      - name: Run changed models
        run: dbt run --select state:modified+ --target ci --defer --state ./target
        env:
          DBT_PROFILES_DIR: ~/.dbt

      - name: Test changed models
        run: dbt test --select state:modified+ --target ci
        env:
          DBT_PROFILES_DIR: ~/.dbt
