name: dbt CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'models/**'
      - 'macros/**'
      - 'tests/**'
      - 'seeds/**'
      - 'snapshots/**'
      - 'dbt_project.yml'
      - 'packages.yml'

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: |
          pip install uv
          uv pip install --system -r requirements.txt
          dbt deps

      - name: Write profiles
        run: |
          mkdir -p ~/.dbt
          cp profiles_template.yml ~/.dbt/profiles.yml

      - name: dbt compile
        run: dbt compile --target ci
        env:
          REDSHIFT_HOST: ${{ secrets.REDSHIFT_HOST }}
          REDSHIFT_DBNAME: ${{ secrets.REDSHIFT_DBNAME }}
          REDSHIFT_CI_USER: ${{ secrets.REDSHIFT_CI_USER }}
          REDSHIFT_CI_PASSWORD: ${{ secrets.REDSHIFT_CI_PASSWORD }}

      - name: dbt run
        run: dbt run --target ci
        env:
          REDSHIFT_HOST: ${{ secrets.REDSHIFT_HOST }}
          REDSHIFT_DBNAME: ${{ secrets.REDSHIFT_DBNAME }}
          REDSHIFT_CI_USER: ${{ secrets.REDSHIFT_CI_USER }}
          REDSHIFT_CI_PASSWORD: ${{ secrets.REDSHIFT_CI_PASSWORD }}

      - name: dbt test
        run: dbt test --target ci
        env:
          REDSHIFT_HOST: ${{ secrets.REDSHIFT_HOST }}
          REDSHIFT_DBNAME: ${{ secrets.REDSHIFT_DBNAME }}
          REDSHIFT_CI_USER: ${{ secrets.REDSHIFT_CI_USER }}
          REDSHIFT_CI_PASSWORD: ${{ secrets.REDSHIFT_CI_PASSWORD }}
